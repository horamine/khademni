server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/freelancers/**, /api/clients/**

        - id: project-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/projects/**

        - id: application-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/applications/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: "*"
